<!DOCTYPE html>
<html lang="ru">

<head>
    <!-- Meta tags -->
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <meta content="text/html; charset=utf-8" http-equiv="content-type" />

    <!-- CSS -->
    <link href="{{ get_url(path='styles.css', trailing_slash=false, cachebust=true) | safe }}" rel="stylesheet" />

    {% block rss %}
    <!-- RSS -->
    <link href="{{ get_url(path='atom.xml', trailing_slash=false) | safe }}" rel="alternate" title="RSS" type="application/atom+xml" />
    {% endblock %}

    <title>Valentine's website</title>
</head>

<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/blog">Blog</a>
        </nav>
    </header>

    <article>
        {% block content %}{% endblock %}
    </article>

    <footer>
        <small>
            <span>{{ now() | date(format='%Y') | safe }}</span>
            <span>&#169;</span>
            <a href="mailto:hi@popov.link">Valentin Popov</a>
            <span>|</span>
            <a href="{{ get_url(path='atom.xml', trailing_slash=false) | safe }}">RSS</a>
        </small>
    </footer>
</body>

</html>
