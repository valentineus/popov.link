{% extends 'base.html' %}

{% block content %}
<header>
    <h1>{{ page.title | safe }}</h1>
</header>

{{ page.content | safe }}

<small>
    <span>Published</span>
    <time datetime="{{ page.date | date(format='%+') | safe }}">{{ page.date | safe }}</time>
    <span>|</span>
    <a href="mailto:hi@popov.link?subject={{ page.title | safe }}">Feedback</a>
    <span>|</span>
    <a href="{{ page.permalink | safe }}">Permalink</a>
</small>
{% endblock content %}
