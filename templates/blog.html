{% extends 'base.html' %}

{% block content %}
{% for year, posts in section.pages | group_by(attribute='year') %}
<section>
    <h2>{{ year | trim }}</h2>

    <ul>
        {% for page in posts %}
        <li>
            <time datetime="{{ page.date | date(format='%+') | trim }}">{{ page.date | date(format='%Y/%m/%d') | trim }}</time>
            <span>&mdash;</span>
            <a href="{{ page.permalink | trim }}">{{ page.title | trim }}</a>
        </li>
        {% endfor %}
    </ul>
</section>
{% endfor %}
{% endblock content %}
